<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>charactor demo</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family:
          system-ui,
          sans-serif;
        background: #1a1b26;
        color: #c0caf5;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 100vh;
      }
      #stage-wrap {
        flex: 1;
        min-height: 400px;
        position: relative;
      }
      #controls {
        padding: 12px 16px;
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        align-items: center;
        border-top: 1px solid #3b4261;
        background: #16161e;
      }
      .group {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .group-label {
        font-size: 12px;
        color: #565f89;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-right: 4px;
      }
      button {
        padding: 8px 14px;
        border-radius: 6px;
        border: 1px solid #565f89;
        background: #24283b;
        color: #c0caf5;
        cursor: pointer;
      }
      button:hover {
        background: #414868;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .hint {
        font-size: 13px;
        color: #7aa2f7;
        margin-left: 8px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="stage-wrap"></div>
      <div id="controls">
        <div class="group">
          <span class="group-label">Character state</span>
          <button type="button" data-character-state="neutral">neutral</button>
          <button type="button" data-character-state="sad">sad</button>
        </div>
        <div class="group">
          <span class="group-label">Action</span>
          <button type="button" data-action="idle">idle</button>
          <button type="button" data-action="talk">talk</button>
          <button type="button" data-play-neutral-click>click</button>
        </div>
        <span class="hint"
          >Melt / unmelt transitions play when switching neutral &harr; sad. Crossfade uses
          <code>transitionMs</code> (default 200ms). While <strong>neutral</strong>, click the cube or
          the click button — the reaction plays fast and returns to idle when it finishes.</span
        >
      </div>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
